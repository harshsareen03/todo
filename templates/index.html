<!DOCTYPE html>
<html>
<head>
    <title>Todo App</title>
</head>
<body>

<h1>Todo Application</h1>

<form action="/add" method="post">

    <input
        type="text"
        name="task"
        placeholder="Enter task"
    >

    <button type="submit">
        Add
    </button>

</form>

<hr>

<ul>

{% for todo in todos %}

<li>{{ todo }}</li>

{% endfor %}

</ul>

</body>
</html>
